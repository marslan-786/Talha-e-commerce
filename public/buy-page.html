<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Checkout | Caliber 7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { background-color: #ffffff; color: #1a1a1a; font-family: 'Plus Jakarta Sans', sans-serif; }
        .premium-logo-text { background: linear-gradient(270deg, #ff0055, #0070f3, #000, #ff0055); background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: color-shift 4s ease infinite; }
        @keyframes color-shift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .vip-input { width: 100%; padding: 14px; border-radius: 15px; border: 1.5px solid #f0f0f0; background: #fafafa; outline: none; transition: 0.3s; font-size: 0.9rem; font-weight: 600; }
        .vip-input:focus { border-color: #000; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .spinner { width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-10">
    <header class="bg-white border-b border-gray-100 p-6 flex flex-col items-center gap-1">
        <h1 class="premium-logo-text text-3xl font-black tracking-tighter">CALIBER 7</h1>
        <p class="text-[10px] font-black text-blue-600 tracking-[0.5em] uppercase">Secure Multi-Checkout</p>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-10 flex flex-col lg:flex-row gap-10">
        <!-- Shipping Form -->
        <div class="flex-1 bg-white p-6 md:p-12 rounded-[40px] shadow-sm border border-gray-100">
            <h2 class="text-2xl font-black mb-10 flex items-center gap-4 uppercase tracking-tight">
                <i class="fa-solid fa-map-location-dot text-blue-600"></i> Shipping Address
            </h2>
            <form id="orderForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div><label class="text-[10px] font-bold text-gray-400 ml-2 uppercase">First Name</label><input type="text" class="vip-input" required></div>
                <div><label class="text-[10px] font-bold text-gray-400 ml-2 uppercase">Last Name</label><input type="text" class="vip-input" required></div>
                <div class="md:col-span-2"><label class="text-[10px] font-bold text-gray-400 ml-2 uppercase">Email</label><input type="email" class="vip-input" required></div>
                <div><label class="text-[10px] font-bold text-gray-400 ml-2 uppercase">City</label><input type="text" class="vip-input" required></div>
                <div><label class="text-[10px] font-bold text-gray-400 ml-2 uppercase">Phone</label><input type="tel" class="vip-input" required></div>
                <div class="md:col-span-2"><label class="text-[10px] font-bold text-gray-400 ml-2 uppercase">Street Address</label><textarea class="vip-input h-28 pt-4" required></textarea></div>
            </form>
            
            <div class="mt-10 p-6 bg-blue-50 rounded-3xl border-2 border-dashed border-blue-200 flex items-center gap-5">
                <div class="bg-blue-600 text-white w-12 h-12 rounded-full flex items-center justify-center text-xl"><i class="fa-solid fa-handshake"></i></div>
                <div>
                    <h4 class="font-black text-blue-900 uppercase text-sm">Payment Method</h4>
                    <p class="text-blue-600 font-bold text-xs uppercase tracking-widest">Cash On Delivery (COD)</p>
                </div>
            </div>
        </div>

        <!-- Multi-Order Summary -->
        <div class="w-full lg:w-[420px] space-y-6">
            <div class="bg-white p-8 rounded-[40px] shadow-xl border border-gray-100 sticky top-28">
                <h3 class="font-black text-sm mb-8 uppercase tracking-[0.2em] border-b pb-4">Selection Summary</h3>
                
                <div id="summaryList" class="max-h-60 overflow-y-auto space-y-4 mb-8 pr-2">
                    <p class="text-gray-300 font-bold animate-pulse text-center uppercase">Auditing Selection...</p>
                </div>

                <div class="space-y-4 border-t pt-8 text-sm">
                    <div class="flex justify-between text-gray-400 font-bold"><span>Items Subtotal</span><span id="billSubtotal">Rs. 0</span></div>
                    <div class="flex justify-between text-gray-400 font-bold"><span>VIP Shipping</span><span id="billShipping">Rs. 0</span></div>
                    <div class="flex justify-between text-gray-400 font-bold"><span>Secure Tax</span><span id="billTax">Rs. 0</span></div>
                    <div class="flex justify-between border-t pt-5 text-2xl font-black text-black"><span>Final Total</span><span id="billTotal">Rs. 0</span></div>
                </div>

                <button id="orderBtn" onclick="submitOrder()" class="w-full bg-black text-white py-6 rounded-3xl font-black mt-10 hover:bg-gray-800 transition-all shadow-[0_20px_40px_rgba(0,0,0,0.2)] flex items-center justify-center gap-4 uppercase tracking-widest text-sm">
                    <span id="btnText">PLACE ORDER NOW</span>
                    <div id="btnLoader" class="spinner"></div>
                </button>
            </div>
        </div>
    </main>

    <script>
        let subtotal = 0;

        async function initCheckout() {
            const ids = window.location.pathname.split('/').pop().split(',');
            
            const res = await fetch('/api/products/bulk', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ids: ids })
            });
            const products = await res.json();
            
            const list = document.getElementById('summaryList');
            list.innerHTML = products.map(p => {
                subtotal += p.price;
                return `
                    <div class="flex items-center gap-4">
                        <img src="${p.imageUrl}" class="w-14 h-14 rounded-xl object-cover border border-gray-50">
                        <div class="flex-1 overflow-hidden">
                            <h4 class="font-bold text-[11px] uppercase truncate">${p.title}</h4>
                            <p class="text-black font-black text-xs">Rs. ${p.price}</p>
                        </div>
                    </div>
                `;
            }).join('');
            
            updateBill();
        }

        function updateBill() {
            const ship = Math.floor(Math.random() * (500 - 300 + 1)) + 300;
            const tax = Math.floor(Math.random() * (100 - 50 + 1)) + 50;
            const total = subtotal + ship + tax;

            document.getElementById('billSubtotal').innerText = `Rs. ${subtotal.toLocaleString()}`;
            document.getElementById('billShipping').innerText = `Rs. ${ship}`;
            document.getElementById('billTax').innerText = `Rs. ${tax}`;
            document.getElementById('billTotal').innerText = `Rs. ${total.toLocaleString()}`;
        }

        function submitOrder() {
            const form = document.getElementById('orderForm');
            if(!form.checkValidity()) return alert("Please complete shipping address details!");

            const btn = document.getElementById('orderBtn');
            const loader = document.getElementById('btnLoader');
            const txt = document.getElementById('btnText');

            txt.innerText = "AUTHENTICATING...";
            loader.style.display = "block";
            btn.disabled = true;

            setTimeout(() => {
                alert("Order Placed Successfully! ✅ Your Caliber 7 selection is on the way.");
                localStorage.setItem('cart', '[]'); // آرڈر کے بعد کارٹ صاف کریں
                window.location.href = "/";
            }, 3000);
        }

        window.onload = initCheckout;
    </script>
</body>
</html>
