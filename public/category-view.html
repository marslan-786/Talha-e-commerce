<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Category Store | Caliber 7</title>
    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { background-color: #ffffff; color: #1a1a1a; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        .premium-logo-text { 
            background: linear-gradient(270deg, #ff0055, #0070f3, #000, #ff0055); 
            background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            animation: color-shift 4s ease infinite; 
        }
        @keyframes color-shift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .seven-svg path {
            stroke: #000; fill: none; stroke-width: 10; stroke-linecap: round;
            animation: drawColor 3s infinite alternate ease-in-out;
        }
        @keyframes drawColor { 0% { stroke: #ff0055; stroke-dasharray: 100; stroke-dashoffset: 100; } 100% { stroke: #0070f3; stroke-dashoffset: 0; } }

        #sidebar { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .sidebar-item { transition: all 0.2s; border-radius: 0.75rem; color: #94a3b8; }
        .sidebar-item:hover { background-color: rgba(255,255,255,0.05); color: #ffffff; }

        .product-card { 
            background: #fff; border-radius: 1.25rem; border: 1px solid #f3f4f6; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.02); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }

        .toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); transition: 0.5s ease; z-index: 9999; }
        .toast.active { bottom: 2rem; }
        .cat-banner { background: #fafafa; border-bottom: 1px solid #f0f0f0; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-[1000] hidden backdrop-blur-sm"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-[#020203] text-white flex flex-col h-full z-[1001] -translate-x-full border-r border-gray-900 shadow-2xl">
        <div class="p-6 border-b border-gray-900 flex justify-between items-center">
            <span class="premium-logo-text text-xl font-black uppercase">Caliber 7</span>
            <button onclick="toggleSidebar()" class="text-gray-500 hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
        </div>
        <nav class="flex-1 overflow-y-auto p-4 space-y-2">
            <a href="/" class="flex items-center gap-3 p-3 sidebar-item hover:text-white"><i class="fa-solid fa-house"></i> <span>Home</span></a>
        </nav>
    </aside>

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 px-4 py-4 flex items-center justify-between">
        <button onclick="toggleSidebar()" class="text-gray-800 p-2"><i class="fa-solid fa-bars-staggered text-2xl"></i></button>
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='/'">
            <h1 class="premium-logo-text text-2xl font-black">CALIBER</h1>
            <svg class="seven-svg" width="25" height="35" viewBox="0 0 100 120"><path d="M20 20 L80 20 L40 100" /></svg>
        </div>
        <div class="relative cursor-pointer" onclick="window.location.href='/cart'">
            <i class="fa-solid fa-cart-shopping text-xl"></i>
            <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
        </div>
    </header>

    <div class="cat-banner py-10 px-6 md:px-20">
        <h3 class="text-xs font-bold text-blue-600 tracking-[0.4em] uppercase mb-2">Discovery Collection</h3>
        <h1 id="catTitle" class="text-4xl md:text-6xl font-black tracking-tighter uppercase">Category Name</h1>
        <div class="flex items-center gap-4 mt-6">
            <div class="h-1 w-20 bg-black rounded-full"></div>
            <p id="itemCount" class="text-xs font-bold text-gray-400">WAITING FOR DATA...</p>
        </div>
    </div>

    <main class="flex-1 p-4 md:p-10">
        <div id="productGrid" class="grid grid-cols-2 lg:grid-cols-5 gap-4 md:gap-8">
            <!-- Loading State -->
            <div id="scanningMsg" class="col-span-full py-20 text-center text-gray-300 font-bold uppercase tracking-widest animate-pulse">
                <i class="fa-solid fa-circle-notch fa-spin mr-3"></i> SCANNING CALIBER CATALOG...
            </div>
        </div>
    </main>

    <footer class="bg-gray-50 border-t border-gray-100 py-12 px-6 text-center">
        <span class="premium-logo-text font-black text-xl tracking-widest">CALIBER 7</span>
        <p class="text-xs text-gray-400 font-bold mt-2 uppercase">© 2026 ALL RIGHTS RESERVED.</p>
    </footer>

    <div id="toast" class="toast bg-black text-white px-8 py-4 rounded-full shadow-2xl font-bold flex items-center gap-3">
        <i class="fa-solid fa-circle-check text-green-400"></i>
        <span>Selection Updated!</span>
    </div>

    <script>
        async function loadCategory() {
            // URL سے کیٹیگری کا نام نکالنا
            const pathParts = window.location.pathname.split('/');
            const catName = decodeURIComponent(pathParts[pathParts.length - 1]);
            
            document.getElementById('catTitle').innerText = catName;

            try {
                // API سے ڈیٹا منگوانا
                const res = await fetch('/api/category/' + catName);
                if (!res.ok) throw new Error("API Connection Failed");
                
                const products = await res.json();
                
                document.getElementById('itemCount').innerText = `${products.length} ITEMS FOUND`;
                const grid = document.getElementById('productGrid');
                
                // پرانا میسج ہٹائیں
                const scanningMsg = document.getElementById('scanningMsg');
                if(scanningMsg) scanningMsg.remove();

                if(products.length === 0) {
                    grid.innerHTML = `<div class="col-span-full py-20 text-center font-bold text-gray-400 uppercase tracking-widest">No products found in this vault.</div>`;
                    return;
                }

                grid.innerHTML = products.map(p => `
                    <div class="product-card p-2 md:p-3" onclick="window.location.href='/product/${p._id}'">
                        <div class="aspect-square rounded-2xl overflow-hidden mb-4 bg-gray-50">
                            <img src="${p.imageUrl}" class="w-full h-full object-cover hover:scale-110 transition-transform duration-500">
                        </div>
                        <div class="px-2 pb-2">
                            <h3 class="font-bold text-sm md:text-base mb-1 truncate uppercase">${p.title}</h3>
                            <div class="flex items-center justify-between mt-3">
                                <span class="font-black text-black text-sm md:text-lg">Rs. ${p.price}</span>
                            </div>
                            <div class="grid grid-cols-2 gap-2 mt-4" onclick="event.stopPropagation()">
                                <button onclick="addToCart('${p._id}')" class="bg-black text-white text-[9px] font-bold py-2.5 rounded-lg active:scale-95 transition-transform">CART</button>
                                <button onclick="window.location.href='/buy/${p._id}'" class="bg-blue-600 text-white text-[9px] font-bold py-2.5 rounded-lg active:scale-95 transition-transform">BUY</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('productGrid').innerHTML = `<div class="col-span-full py-20 text-center font-bold text-red-400 uppercase tracking-widest">ERROR: UNABLE TO REACH CATALOG. PLEASE REFRESH.</div>`;
                console.error("Fetch Error:", e);
            }
        }

        // Global UI Helpers
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }

        function addToCart(id) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart.push(id);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            
            const toast = document.getElementById('toast');
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 3000);
        }

        function updateCartCount() {
            const count = JSON.parse(localStorage.getItem('cart') || '[]').length;
            document.getElementById('cartCount').innerText = count;
        }

        window.onload = () => {
            loadCategory();
            updateCartCount();
        };
    </script>
</body>
</html>
