<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <!-- Search Overlay -->
    <div id="searchOverlay" class="search-overlay">
        <input type="text" id="searchInput" placeholder="Search Caliber Products..." style="flex:1; border:none; outline:none; font-size:1.2rem; font-weight:600;" oninput="doSearch()">
        <div onclick="closeSearch()" style="cursor:pointer; padding:10px;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </div>
    </div>

    <!-- VIP Sidebar -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <span class="brand-title">MENU</span>
            <div onclick="toggleMenu()" style="cursor:pointer;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </div>
        </div>
        <div class="menu-item"><div class="menu-icon-box">🏠</div> HOME</div>
        <div class="menu-item" onclick="toggleFilter()"><div class="menu-icon-box">⏳</div> SORT BY</div>
        <div class="menu-item"><div class="menu-icon-box">📜</div> PRIVACY POLICY</div>
        <div class="menu-item"><div class="menu-icon-box">💬</div> HELP CENTER</div>
    </div>

    <!-- Header -->
    <div class="header">
        <div onclick="toggleMenu()" style="cursor:pointer;">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </div>
        <div class="brand-wrapper">
            <span class="brand-title vip-animated-title">CALIBER</span>
            <svg class="seven-svg" width="30" height="40" viewBox="0 0 100 120"><path d="M20 20 L80 20 L40 100" /></svg>
        </div>
        <div style="display:flex; gap:15px;">
            <div onclick="openSearch()" style="cursor:pointer;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>
            <div class="cart-btn" onclick="window.location.href='/cart'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <span id="cartCount" class="cart-badge">0</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="homeSections"></div>

    <!-- Filter Modal -->
    <div id="filterOverlay" class="filter-overlay">
        <div class="filter-card">
            <h2 style="margin-bottom:25px;">SORT PRODUCTS</h2>
            <div class="filter-opt" onclick="applySort('low')">Price: Low to High</div>
            <div class="filter-opt" onclick="applySort('high')">Price: High to Low</div>
            <div class="filter-opt" onclick="applySort('latest')">Latest Items</div>
            <p onclick="toggleFilter()" style="margin-top:20px; cursor:pointer; color:#999; font-weight:700;">CANCEL</p>
        </div>
    </div>

    <div id="toast" class="toast">Added to Cart! ✅</div>

    <footer class="vip-footer">
        <p class="copy-text">© 2026 CALIBER 7 LUXURY. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        let allProducts = [];

        async function loadData() {
            const res = await fetch('/api/get-products');
            allProducts = await res.json();
            renderHome(allProducts);
        }

        function renderHome(data) {
            const container = document.getElementById('homeSections');
            container.innerHTML = "";
            const categories = [...new Set(data.map(p => p.category))];

            categories.forEach(cat => {
                const catProducts = data.filter(p => p.category === cat).slice(0, 4);
                const section = `
                    <div class="category-section">
                        <div class="category-header">
                            <h2>${cat.toUpperCase()}</h2>
                            <a href="#" class="view-all">View All →</a>
                        </div>
                        <div class="product-grid">
                            ${catProducts.map(p => `
                                <div class="product-card" onclick="window.location.href='/product/${p._id}'">
                                    <div class="img-container"><img src="${p.imageUrl}" class="product-img"></div>
                                    <div class="product-info">
                                        <div class="p-title">${p.title}</div>
                                        <div class="p-price">Rs. ${p.price}</div>
                                        <div class="action-area" onclick="event.stopPropagation()">
                                            <button class="btn-cart" onclick="addToCart('${p._id}')">ADD TO CART</button>
                                            <button class="btn-buy">BUY</button>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.innerHTML += section;
            });
        }

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        function toggleFilter() { document.getElementById('filterOverlay').classList.toggle('active'); }
        function openSearch() { document.getElementById('searchOverlay').classList.add('active'); document.getElementById('searchInput').focus(); }
        function closeSearch() { document.getElementById('searchOverlay').classList.remove('active'); renderHome(allProducts); }
        
        function doSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => p.title.toLowerCase().includes(q));
            renderHome(filtered);
        }

        function applySort(type) {
            let sorted = [...allProducts];
            if(type === 'low') sorted.sort((a,b) => a.price - b.price);
            if(type === 'high') sorted.sort((a,b) => b.price - a.price);
            renderHome(sorted);
            toggleFilter();
        }

        function addToCart(id) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart.push(id);
            localStorage.setItem('cart', JSON.stringify(cart));
            document.getElementById('cartCount').innerText = cart.length;
            const t = document.getElementById('toast');
            t.classList.add('active');
            setTimeout(() => t.classList.remove('active'), 3000);
        }

        window.onload = loadData;
    </script>
</body>
</html>
