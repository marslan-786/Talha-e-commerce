<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="header" style="justify-content: center;">
        <div class="brand-wrapper">
            <div><span class="brand-title">CALIBER</span><span class="sub-brand">LUXURY ADMIN</span></div>
            <svg class="seven-svg" width="35" height="45" viewBox="0 0 100 120"><path d="M20 20 L80 20 L40 100" /></svg>
        </div>
    </div>

    <div style="padding: 50px 20px; display: flex; flex-direction: column; align-items: center;">
        <input type="password" id="keyInput" class="vip-input" style="max-width: 350px; text-align: center; border-radius: 50px;" placeholder="Enter Access Key">
        <button onclick="login()" class="verify-btn" style="max-width: 350px;">VERIFY ACCESS</button>
    </div>

    <script>
        async function login() {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({accessKey: document.getElementById('keyInput').value})
            });
            if (res.ok) window.location.href = '/talha/products';
            else alert("Invalid Key!");
        }
    </script>
</body>
</html>
