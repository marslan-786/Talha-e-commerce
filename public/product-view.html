<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Product Details | Caliber 7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { vipBlack: '#020203', vipAccent: '#0070f3', vipPink: '#ff0055' }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { background-color: #ffffff; color: #1a1a1a; font-family: 'Plus Jakarta Sans', sans-serif; }

        /* VIP Logo Animation */
        .premium-logo-text { 
            background: linear-gradient(270deg, #ff0055, #0070f3, #000, #ff0055); 
            background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            animation: color-shift 4s ease infinite; 
        }
        @keyframes color-shift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .seven-svg path {
            stroke: #000; fill: none; stroke-width: 10; stroke-linecap: round;
            animation: drawColor 3s infinite alternate ease-in-out;
        }
        @keyframes drawColor { 0% { stroke: #ff0055; stroke-dasharray: 100; stroke-dashoffset: 100; } 100% { stroke: #0070f3; stroke-dashoffset: 0; } }

        /* Sidebar & Menu */
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .dropdown-menu { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .dropdown-menu.active { max-height: 300px; }

        /* Product Image VIP Styling */
        .main-img-box { box-shadow: 0 30px 60px -12px rgba(0,0,0,0.15); transition: 0.3s; }
        .main-img-box:hover { transform: scale(1.02); }

        /* Related Product Card */
        .related-card { transition: all 0.3s ease; border-radius: 1rem; border: 1px solid #f3f4f6; }
        .related-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        /* Toast Message */
        .toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 9999; }
        .toast.active { bottom: 2rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Sidebar Overlay -->
    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-[1000] hidden backdrop-blur-sm"></div>

    <!-- VIP Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-[#020203] text-white flex flex-col h-full z-[1001] -translate-x-full border-r border-gray-900 shadow-2xl">
        <div class="p-6 border-b border-gray-900 flex justify-between items-center">
            <span class="premium-logo-text text-xl font-black">CALIBER 7</span>
            <button onclick="toggleSidebar()" class="text-gray-500 hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="/" class="flex items-center gap-3 p-3 text-gray-400 hover:bg-white/5 hover:text-white rounded-xl"><i class="fa-solid fa-house"></i> <span>Home</span></a>
        </nav>
    </aside>

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 px-4 py-4 flex items-center justify-between">
        <button onclick="toggleSidebar()" class="text-gray-800 p-2"><i class="fa-solid fa-bars-staggered text-2xl"></i></button>
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='/'">
            <h1 class="premium-logo-text text-2xl font-black">CALIBER</h1>
            <svg class="seven-svg" width="25" height="35" viewBox="0 0 100 120"><path d="M20 20 L80 20 L40 100" /></svg>
        </div>
        <div class="relative cursor-pointer" onclick="window.location.href='/cart'">
            <i class="fa-solid fa-cart-shopping text-xl"></i>
            <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto w-full p-4 md:p-8">
        <div id="productLoading" class="text-center py-20 font-bold text-gray-400 animate-pulse">Establishing Secure Connection to Caliber 7...</div>
        
        <div id="productDisplay" class="hidden flex flex-col md:flex-row gap-10 md:gap-16">
            <div class="w-full md:w-1/2">
                <div class="main-img-box rounded-3xl overflow-hidden bg-gray-50 aspect-square">
                    <img id="pImg" src="" class="w-full h-full object-cover">
                </div>
            </div>

            <div class="w-full md:w-1/2 flex flex-col justify-center">
                <div id="pCat" class="text-blue-600 font-extrabold text-xs uppercase tracking-[0.3em] mb-2">Category</div>
                <h1 id="pTitle" class="text-3xl md:text-5xl font-black tracking-tight mb-4 leading-tight uppercase">Product Title</h1>
                <div id="pPrice" class="text-3xl font-black text-black mb-6">Rs. 0.00</div>
                
                <div class="border-y border-gray-100 py-6 mb-8">
                    <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Product Description</h4>
                    <p id="pDesc" class="text-gray-600 leading-relaxed text-sm md:text-base">Details go here...</p>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- Add To Cart -->
                    <button id="addToCartBtn" class="bg-black text-white py-5 rounded-2xl font-black tracking-widest hover:bg-gray-900 transition-all flex items-center justify-center gap-3 uppercase active:scale-95">
                        <i class="fa-solid fa-cart-plus"></i> Add To Cart
                    </button>
                    <!-- Buy Now (Now Active) -->
                    <button id="buyNowBtn" class="bg-blue-600 text-white py-5 rounded-2xl font-black tracking-widest hover:bg-blue-700 transition-all flex items-center justify-center gap-3 uppercase shadow-[0_10px_20px_rgba(59,130,246,0.3)] active:scale-95">
                        <i class="fa-solid fa-bolt"></i> Buy Now
                    </button>
                </div>
            </div>
        </div>

        <div id="relatedSection" class="hidden mt-24">
            <div class="flex items-center gap-4 mb-10">
                <h2 class="text-xl font-black uppercase tracking-wider">Related Items</h2>
                <div class="flex-1 h-px bg-gray-100"></div>
            </div>
            <div id="relatedGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </div>
    </main>

    <footer class="bg-gray-50 border-t border-gray-100 py-12 px-6 text-center mt-20">
        <span class="premium-logo-text font-black text-xl tracking-widest">CALIBER 7</span>
        <p class="text-xs text-gray-400 font-bold uppercase tracking-widest">© 2026 REGISTERED TRADEMARK.</p>
    </footer>

    <div id="toast" class="toast bg-black text-white px-8 py-4 rounded-full shadow-2xl font-bold flex items-center gap-3">
        <i class="fa-solid fa-circle-check text-green-400"></i>
        <span>Item added to your selection!</span>
    </div>

    <script>
        let currentProductId = "";

        async function loadProductView() {
            const pathParts = window.location.pathname.split('/');
            currentProductId = pathParts[pathParts.length - 1];

            try {
                const res = await fetch('/api/product/' + currentProductId);
                const p = await res.json();

                if(p) {
                    document.getElementById('pImg').src = p.imageUrl;
                    document.getElementById('pTitle').innerText = p.title;
                    document.getElementById('pPrice').innerText = `Rs. ${p.price}`;
                    document.getElementById('pDesc').innerText = p.description;
                    document.getElementById('pCat').innerText = p.category;
                    
                    document.getElementById('productLoading').classList.add('hidden');
                    document.getElementById('productDisplay').classList.remove('hidden');
                    
                    // بٹنز کو ایکٹیو کرنا
                    document.getElementById('addToCartBtn').onclick = () => addToCart(p._id);
                    document.getElementById('buyNowBtn').onclick = () => window.location.href = '/buy/' + p._id;

                    loadRelated(p.category, p._id);
                }
            } catch (e) {
                document.getElementById('productLoading').innerText = "ERROR: Product not found.";
            }
        }

        async function loadRelated(cat, currentId) {
            const res = await fetch('/api/category/' + cat);
            const products = await res.json();
            const relatedGrid = document.getElementById('relatedGrid');
            const filtered = products.filter(item => item._id !== currentId).slice(0, 4);
            
            if(filtered.length > 0) {
                document.getElementById('relatedSection').classList.remove('hidden');
                relatedGrid.innerHTML = filtered.map(p => `
                    <div class="related-card p-2 bg-white cursor-pointer" onclick="window.location.href='/product/${p._id}'">
                        <div class="aspect-square rounded-xl overflow-hidden bg-gray-50 mb-3">
                            <img src="${p.imageUrl}" class="w-full h-full object-cover">
                        </div>
                        <h4 class="font-bold text-xs truncate uppercase px-1">${p.title}</h4>
                        <p class="text-blue-600 font-black text-sm px-1">Rs. ${p.price}</p>
                    </div>
                `).join('');
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }

        function addToCart(id) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart.push(id);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            const toast = document.getElementById('toast');
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 3000);
        }

        function updateCartCount() {
            const count = JSON.parse(localStorage.getItem('cart') || '[]').length;
            document.getElementById('cartCount').innerText = count;
        }

        window.onload = () => {
            loadProductView();
            updateCartCount();
        };
    </script>
</body>
</html>
