<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="/style.css"></head>
<body>
    <div class="header">
        <div class="menu-icon">☰</div>
        <div class="brand-wrapper">
            <div><span class="brand-title">CALIBER</span><span class="sub-brand">ADD PRODUCT</span></div>
            <svg class="seven-svg" width="40" height="50" viewBox="0 0 100 120"><path d="M20 20 L80 20 L40 100" /></svg>
        </div>
    </div>

    <div style="max-width: 500px; margin: 40px auto; padding: 20px;">
        <div id="previewBox" style="width:100%; height:250px; border:1px solid #eee; margin-bottom:20px; border-radius:15px; display:flex; align-items:center; justify-content:center; overflow:hidden;">
            <img id="prevImg" src="" style="max-width:100%; max-height:100%; display:none;">
            <span id="prevText">Image Preview</span>
        </div>
        
        <input type="text" id="imgUrl" class="vip-input" style="width:100%; border-radius:10px; text-align:left; padding-left:15px;" placeholder="Image URL" oninput="showPrev(this.value)">
        <input type="text" id="title" class="vip-input" style="width:100%; margin-top:15px; border-radius:10px; text-align:left; padding-left:15px;" placeholder="Product Name">
        <textarea id="desc" class="vip-input" style="width:100%; margin-top:15px; border-radius:10px; text-align:left; padding-left:15px; height:100px;" placeholder="Product Details"></textarea>
        <input type="number" id="price" class="vip-input" style="width:100%; margin-top:15px; border-radius:10px; text-align:left; padding-left:15px;" placeholder="Price (PKR)">
        <input type="text" id="cat" class="vip-input" style="width:100%; margin-top:15px; border-radius:10px; text-align:left; padding-left:15px;" placeholder="Category">

        <button onclick="addProduct()" class="verify-btn" style="width:100%">PUBLISH PRODUCT</button>
    </div>

    <script>
        function showPrev(url) {
            const img = document.getElementById('prevImg');
            const txt = document.getElementById('prevText');
            if(url) { img.src = url; img.style.display='block'; txt.style.display='none'; }
        }

        async function addProduct() {
            const data = {
                title: document.getElementById('title').value,
                description: document.getElementById('desc').value,
                price: document.getElementById('price').value,
                imageUrl: document.getElementById('imgUrl').value,
                category: document.getElementById('cat').value
            };
            await fetch('/api/add-product', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(data)
            });
            alert("Published!");
            window.location.href = '/talha/products';
        }
    </script>
</body>
</html>
